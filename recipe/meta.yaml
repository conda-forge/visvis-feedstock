{% set name = "visvis" %}
{% set version = "1.11.1" %}
{% set sha256 = "5c659146e7db7183de3921ada363d51bbfee295aee2cff6a4116d1f04055ef1b" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - pyopengl

test:
  requires:
    - python {{ python_min }}
  imports:
    - visvis
    - visvis.processing

about:
  home: https://github.com/almarklein/visvis
  doc_url: https://github.com/almarklein/visvis/wiki
  dev_url: https://github.com/almarklein/visvis
  summary: Visvis - the object oriented approach to visualization
  license: BSD 3-Clause
  license_file: license.txt

extra:
  recipe-maintainers:
    - almarklein
